<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bitcoin CCI Dashboard – 2021–2022 Case Study</title>
  <style>
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: #fff; color: #1a1a1a; margin: 0; padding: 24px; box-sizing: border-box; }
    @media (prefers-color-scheme: dark) { body { background: #1a1a18; color: #e0ded6; } }

    .scard { border-radius: 8px; padding: 8px 10px; border: 0.5px solid transparent; cursor: pointer; transition: opacity .2s; }
    .scard:hover { opacity: 0.85; }
    .scard.active { border: 2px solid #1a1a1a; }
    @media (prefers-color-scheme: dark) { .scard.active { border-color: #e0ded6; } }

    .mlabel { font-size: 11px; color: #73726c; }
    .mval   { font-size: 14px; font-weight: 500; color: #1a1a1a; }
    @media (prefers-color-scheme: dark) { .mlabel { color: #9c9a92; } .mval { color: #e0ded6; } }
    .dpos { color: #3B6D11; font-size: 11px; }
    .dneg { color: #A32D2D; font-size: 11px; }
    .vel-neg { color: #A32D2D; font-weight: 500; }
    .vel-pos { color: #3B6D11; font-weight: 500; }

    .panel { background: #f5f4ef; border-radius: 12px; padding: 14px; border: 0.5px solid rgba(0,0,0,0.1); }
    @media (prefers-color-scheme: dark) { .panel { background: #2a2a28; border-color: rgba(255,255,255,0.08); } }

    .sec-label { font-size: 11px; font-weight: 500; color: #73726c; margin-bottom: 10px; letter-spacing: 0.04em; text-transform: uppercase; }
    @media (prefers-color-scheme: dark) { .sec-label { color: #9c9a92; } }
    .divider { border-top: 0.5px solid rgba(0,0,0,0.08); padding-top: 10px; margin-top: 10px; font-size: 12px; color: #73726c; }
    @media (prefers-color-scheme: dark) { .divider { border-top-color: rgba(255,255,255,0.07); color: #9c9a92; } }

    .leg-row { display: flex; align-items: center; gap: 10px; padding: 5px 0; border-bottom: 0.5px solid rgba(0,0,0,0.08); }
    .leg-row:last-child { border-bottom: none; }
    @media (prefers-color-scheme: dark) { .leg-row { border-bottom-color: rgba(255,255,255,0.07); } }
    .leg-bar  { width: 6px; height: 12px; border-radius: 3px; flex-shrink: 0; }
    .leg-range { font-size: 12px; font-weight: 500; color: #1a1a1a; min-width: 52px; }
    .leg-name  { font-size: 12px; font-weight: 500; color: #1a1a1a; min-width: 130px; }
    .leg-desc  { font-size: 11px; color: #73726c; }
    @media (prefers-color-scheme: dark) {
      .leg-range, .leg-name { color: #e0ded6; }
      .leg-desc { color: #9c9a92; }
    }
  </style>
</head>
<body>
<div style="max-width: 960px; margin: 0 auto;">
  <h2 style="font-size: 18px; font-weight: 500; margin: 0 0 4px;">Bitcoin — CCI Dashboard</h2>
  <p style="font-size: 12px; color: #73726c; margin: 0 0 20px;">2021–2022 Case Study · v2.4 CCI + Mid-15-Day Pulse · Historical backtesting</p>

  <div style="display:grid;grid-template-columns:repeat(9,minmax(0,1fr));gap:4px;margin-bottom:20px" id="scards"></div>

  <div style="position:relative;width:100%;height:300px;margin-bottom:6px">
    <canvas id="chartMain"></canvas>
  </div>

  <div style="display:flex;flex-wrap:wrap;gap:12px;margin-bottom:14px;font-size:11px;color:#73726c">
    <span style="display:flex;align-items:center;gap:4px"><span style="width:20px;height:3px;background:#378ADD;border-radius:2px;display:inline-block"></span>Main CCI (stepped)</span>
    <span style="display:flex;align-items:center;gap:4px"><span style="width:20px;height:0;border-top:2px dashed #BA7517;display:inline-block"></span>Mid-15 Pulse CCI</span>
    <span style="display:flex;align-items:center;gap:4px"><span style="width:10px;height:10px;border-radius:2px;background:rgba(99,153,34,0.25);display:inline-block"></span>Bullish band</span>
    <span style="display:flex;align-items:center;gap:4px"><span style="width:10px;height:10px;border-radius:2px;background:rgba(186,117,23,0.25);display:inline-block"></span>Mild bearish band</span>
    <span style="display:flex;align-items:center;gap:4px"><span style="width:10px;height:10px;border-radius:2px;background:rgba(216,90,48,0.28);display:inline-block"></span>Strong bearish band</span>
    <span style="display:flex;align-items:center;gap:4px"><span style="width:10px;height:10px;border-radius:2px;background:rgba(163,45,45,0.32);display:inline-block"></span>Very strong bearish</span>
  </div>

  <div style="position:relative;width:100%;height:120px;margin-bottom:18px">
    <canvas id="chartMV"></canvas>
  </div>

  <div class="panel" style="margin-bottom:18px">
    <div class="sec-label">Phase details</div>
    <div style="display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:10px;margin-bottom:10px" id="smeta"></div>
    <div style="display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:10px" id="drow"></div>
    <div class="divider" id="dnote"></div>
  </div>

  <div class="panel">
    <div class="sec-label">CCI zone reference</div>
    <div id="legend"></div>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<script>
const phases = [
  { n:1, period:"Nov 2021", label:"Peak",          cci:81.9, band:"Very Strong Bullish",  velocity:"+1.2σ", regime:"Healthy",            ampRegime:"Stress",              pulse:null, pulseBand:null,                mv:69000, color:"#639922", bandColor:"rgba(99,153,34,0.22)",    lead:"— (peak)",            notes:"ATH. Amplified regime already flagging Stress while price at top." },
  { n:2, period:"Dec 2021", label:"Reversal",      cci:54.3, band:"Mild Bullish",          velocity:"-3.8σ", regime:"Stress",             ampRegime:"Danger",              pulse:41.7, pulseBand:"Mild Bearish",    mv:46300, color:"#BA7517", bandColor:"rgba(186,117,23,0.25)",  lead:"4–6 weeks",           notes:"Sharp velocity drop. Pulse activated. Danger regime flagged." },
  { n:3, period:"Jan 2022", label:"Decline",       cci:39.1, band:"Mild Bearish",          velocity:"-4.7σ", regime:"Mild Bearish",       ampRegime:"Danger",              pulse:32.4, pulseBand:"Strong Bearish", mv:38500, color:"#D85A30", bandColor:"rgba(216,90,48,0.28)",   lead:"6–8 weeks",           notes:"Steepest velocity drop so far. Pulse deepens signal to Strong Bearish." },
  { n:4, period:"Feb–Mar 2022", label:"Compression", cci:44.5, band:"Mild Bearish",        velocity:"-3.0σ", regime:"Mild Bearish",       ampRegime:"Danger",              pulse:36.9, pulseBand:"Strong Bearish", mv:40000, color:"#D85A30", bandColor:"rgba(216,90,48,0.28)",   lead:"8+ weeks",            notes:"Extended compression. Brief relief before resuming decline." },
  { n:5, period:"Apr 2022", label:"Breakdown",     cci:32.6, band:"Strong Bearish",        velocity:"-4.1σ", regime:"Strong Bearish",     ampRegime:"Strong Bearish",      pulse:27.8, pulseBand:"Strong Bearish", mv:37700, color:"#A32D2D", bandColor:"rgba(163,45,45,0.28)",   lead:"6–8 weeks",           notes:"Regime and amplified regime now aligned. Full bearish confirmation." },
  { n:6, period:"May 2022", label:"Acceleration",  cci:25.1, band:"Strong Bearish",        velocity:"-4.9σ", regime:"Strong Bearish",     ampRegime:"Strong Bearish",      pulse:21.3, pulseBand:"Strong Bearish", mv:29800, color:"#A32D2D", bandColor:"rgba(163,45,45,0.28)",   lead:"4–6 weeks",           notes:"Capitulation acceleration. Pulse deep in danger territory." },
  { n:7, period:"Jun–Jul 2022", label:"Collapse",  cci:19.8, band:"Very Strong Bearish",   velocity:"-5.3σ", regime:"Very Strong Bearish",ampRegime:"Very Strong Bearish", pulse:16.4, pulseBand:"Very Strong Bearish", mv:19800, color:"#791F1F", bandColor:"rgba(121,31,31,0.32)", lead:"4–6 weeks",        notes:"Maximum fear. Velocity at -5.3σ. Both signals at floor." },
  { n:8, period:"Aug–Sep 2022", label:"Bottoming", cci:29.0, band:"Strong Bearish",        velocity:"-2.2σ", regime:"Strong Bearish",     ampRegime:"Strong Bearish",      pulse:null, pulseBand:null,                mv:20000, color:"#A32D2D", bandColor:"rgba(163,45,45,0.28)",   lead:"Bottoming signal",    notes:"Velocity moderating. Pulse deactivated. First signs of stabilisation." },
  { n:9, period:"Oct–Dec 2022", label:"Recovery",  cci:31.4, band:"Strong Bearish",        velocity:"-1.6σ", regime:"Strong Bearish",     ampRegime:"Strong Bearish",      pulse:null, pulseBand:null,                mv:19750, color:"#BA7517", bandColor:"rgba(186,117,23,0.25)",  lead:"Early recovery signal",notes:"Velocity continuing to moderate. MV trough to recovery. CCI improving." },
];

const cciZones = [
  { range:"81–100", name:"Very strong bullish", desc:"Extreme confidence / aggressive FOMO buy pressure", color:"#639922" },
  { range:"63–80",  name:"Strong bullish",       desc:"Clear bullish sentiment, strong buy/hold pressure", color:"#1D9E75" },
  { range:"53–62",  name:"Mild bullish",          desc:"Leaning bullish, not euphoric",                    color:"#378ADD" },
  { range:"48–52",  name:"Neutral / hold",        desc:"No clear direction, balanced buy/sell",            color:"#888780" },
  { range:"38–47",  name:"Mild bearish",           desc:"Leaning cautious, early sell pressure",           color:"#BA7517" },
  { range:"20–37",  name:"Strong bearish",         desc:"Clear bearish sentiment, strong sell pressure",   color:"#D85A30" },
  { range:"0–19",   name:"Very strong bearish",    desc:"Extreme fear / panic selling",                    color:"#E24B4A" },
];

const labels     = phases.map(p => p.period);
const cciData    = phases.map(p => p.cci);
const pulseData  = phases.map(p => p.pulse);
const mvData     = phases.map(p => p.mv / 1000);
const bandColors = phases.map(p => p.bandColor);
const bandMin    = phases.map(p => { if(p.cci>80) return 60; if(p.cci>60) return 38; if(p.cci>48) return 25; if(p.cci>37) return 10; return 0; });
const bandMax    = phases.map(p => { if(p.cci>80) return 100; if(p.cci>60) return 80; if(p.cci>48) return 62; if(p.cci>37) return 52; if(p.cci>19) return 47; return 25; });

let active = 0;

function renderCards() {
  document.getElementById('scards').innerHTML = phases.map((p, i) => `
    <div class="scard ${i===active?'active':''}" style="background:${p.color}" onclick="setActive(${i})">
      <div style="font-size:9px;color:rgba(255,255,255,0.75);margin-bottom:1px">Ph.${p.n}</div>
      <div style="font-size:12px;font-weight:500;color:rgba(255,255,255,0.95)">${p.cci}</div>
      <div style="font-size:8px;color:rgba(255,255,255,0.8);margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${p.label}</div>
    </div>`).join('');
}

function renderDetail() {
  const p = phases[active];
  const velClass = p.velocity.startsWith('-') ? 'vel-neg' : 'vel-pos';
  const dangerColor = (p.ampRegime.includes('Danger') || p.ampRegime.includes('Very') || p.ampRegime.includes('Strong Bear')) ? '#A32D2D' : '#1a1a1a';

  document.getElementById('smeta').innerHTML = `
    <div>
      <div class="mlabel">Main CCI</div>
      <div class="mval">${p.cci}</div>
      <div style="font-size:10px;color:#73726c;margin-top:2px">${p.band}</div>
    </div>
    <div>
      <div class="mlabel">Velocity</div>
      <div class="mval ${velClass}">${p.velocity}</div>
    </div>
    <div>
      <div class="mlabel">Pure regime</div>
      <div class="mval" style="font-size:12px">${p.regime}</div>
    </div>
    <div>
      <div class="mlabel">Amplified regime</div>
      <div class="mval" style="font-size:12px;color:${dangerColor}">${p.ampRegime}</div>
    </div>
  `;

  document.getElementById('drow').innerHTML = `
    <div>
      <div class="mlabel">Mid-15 pulse CCI</div>
      <div class="mval">${p.pulse !== null ? p.pulse : '—'}</div>
      <div style="font-size:10px;color:#73726c;margin-top:2px">${p.pulseBand ?? 'Not activated'}</div>
    </div>
    <div>
      <div class="mlabel">MV at window end</div>
      <div class="mval">$${(p.mv/1000).toFixed(1)}k</div>
    </div>
    <div>
      <div class="mlabel">Lead time</div>
      <div class="mval" style="font-size:12px">${p.lead}</div>
    </div>
  `;

  document.getElementById('dnote').textContent = `Phase ${p.n} · ${p.period} · ${p.notes}`;
}

function renderLegend() {
  document.getElementById('legend').innerHTML = cciZones.map(z => `
    <div class="leg-row">
      <div class="leg-bar" style="background:${z.color}"></div>
      <div class="leg-range">${z.range}</div>
      <div class="leg-name">${z.name}</div>
      <div class="leg-desc">${z.desc}</div>
    </div>`).join('');
}

window.setActive = function(i) { active = i; renderCards(); renderDetail(); };

function buildCharts() {
  new Chart(document.getElementById('chartMain'), {
    data: {
      labels,
      datasets: [
        {
          type:'bar', label:'CCI band',
          data: bandMin.map((mn,i) => [mn, bandMax[i]]),
          backgroundColor: bandColors, borderWidth:0, borderSkipped:false,
          yAxisID:'y', order:3, barPercentage:1.0, categoryPercentage:1.0,
        },
        {
          type:'line', label:'Main CCI', data:cciData,
          borderColor:'#378ADD', backgroundColor:'transparent',
          borderWidth:2.5, pointRadius:4, pointHoverRadius:6,
          pointBackgroundColor: phases.map(p => p.color),
          pointBorderColor:'#fff', pointBorderWidth:1.5,
          stepped:'before', yAxisID:'y', order:1,
        },
        {
          type:'line', label:'Pulse CCI', data:pulseData,
          borderColor:'#BA7517', backgroundColor:'transparent',
          borderWidth:1.5, borderDash:[5,4],
          pointRadius: pulseData.map(v => v !== null ? 4 : 0),
          pointHoverRadius:5,
          pointBackgroundColor:'#BA7517', pointBorderColor:'#fff', pointBorderWidth:1,
          tension:0.2, yAxisID:'y', order:2, spanGaps:false,
        },
      ]
    },
    options: {
      responsive:true, maintainAspectRatio:false,
      interaction:{ mode:'index', intersect:false },
      plugins:{
        legend:{ display:false },
        tooltip:{
          filter: item => item.datasetIndex !== 0,
          callbacks:{
            title: items => phases[items[0].dataIndex].period,
            label: item => {
              if (item.datasetIndex===1) return `Main CCI: ${item.raw}`;
              if (item.datasetIndex===2 && item.raw !== null) return `Pulse CCI: ${item.raw}`;
              return null;
            },
            afterBody: items => {
              const p = phases[items[0].dataIndex];
              return [`Velocity: ${p.velocity}`, `Regime: ${p.ampRegime}`];
            }
          }
        }
      },
      scales:{
        x:{ grid:{color:'rgba(128,128,128,0.07)'}, ticks:{ font:{size:9}, color:'#888780', maxRotation:25 } },
        y:{ position:'left', title:{display:true, text:'CCI score', font:{size:10}, color:'#378ADD'},
            min:0, max:100, grid:{color:'rgba(55,138,221,0.06)'}, ticks:{font:{size:10}, color:'#378ADD', stepSize:20} }
      },
      onClick:(e,els)=>{ if(els.length) setActive(els[0].index); }
    }
  });

  new Chart(document.getElementById('chartMV'), {
    type:'line',
    data:{
      labels,
      datasets:[{
        data: mvData,
        borderColor:'#E24B4A', backgroundColor:'rgba(226,75,74,0.08)',
        borderWidth:2, pointRadius:4, pointHoverRadius:6,
        pointBackgroundColor: phases.map(p => p.color),
        pointBorderColor:'#fff', pointBorderWidth:1.5,
        tension:0.3, fill:true,
      }]
    },
    options:{
      responsive:true, maintainAspectRatio:false,
      interaction:{ mode:'index', intersect:false },
      plugins:{
        legend:{ display:false },
        tooltip:{
          callbacks:{
            title: items => phases[items[0].dataIndex].period,
            label: item => `MV: $${item.raw.toFixed(1)}k`
          }
        }
      },
      scales:{
        x:{ display:false },
        y:{ position:'right', title:{display:true, text:'Price ($k)', font:{size:10}, color:'#E24B4A'},
            grid:{color:'rgba(128,128,128,0.07)'}, ticks:{font:{size:10}, color:'#888780', callback: v => `$${v}k`} }
      },
      onClick:(e,els)=>{ if(els.length) setActive(els[0].index); }
    }
  });
}

renderCards(); renderDetail(); renderLegend(); buildCharts();
</script>
</body>
</html>
